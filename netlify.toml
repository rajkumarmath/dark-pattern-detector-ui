[build]
  command = "npm install"
  publish = "public"

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"

# IMPORTANT: Force all API requests to go to your backend
[[redirects]]
  from = "/api/*"
  to = "https://dark-pattern-detector.onrender.com/api/v1/:splat"
  status = 200
  force = true

# Handle SPA routing - this must come AFTER API routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
